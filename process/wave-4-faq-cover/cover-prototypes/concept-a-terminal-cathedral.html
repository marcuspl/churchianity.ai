<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 6in;
    height: 9in;
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: 'Cormorant Garamond', Georgia, serif;
    overflow: hidden;
    position: relative;
  }

  /* Subtle texture overlay */
  body::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 50% 30%, rgba(180, 150, 90, 0.03) 0%, transparent 70%),
      radial-gradient(ellipse at 50% 70%, rgba(90, 110, 150, 0.02) 0%, transparent 60%);
    pointer-events: none;
  }

  /* Very faint grid lines suggesting computation */
  body::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      linear-gradient(rgba(180, 150, 90, 0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(180, 150, 90, 0.015) 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 0 0.6in;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    justify-content: center;
  }

  /* Thin decorative rule */
  .rule-top, .rule-bottom {
    width: 2in;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(200, 170, 100, 0.4), transparent);
  }

  .rule-top { margin-bottom: 0.45in; }
  .rule-bottom { margin-top: 0.4in; }

  .title-main {
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    font-weight: 700;
    font-size: 36pt;
    color: #d4b870;
    letter-spacing: 0.02em;
    line-height: 1.1;
    margin-bottom: 0.12in;
    text-transform: none;
  }

  .title-tld {
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    font-weight: 300;
    font-size: 36pt;
    color: rgba(200, 170, 100, 0.55);
  }

  .subtitle-joke {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-weight: 300;
    font-size: 14.5pt;
    color: rgba(220, 200, 160, 0.75);
    letter-spacing: 0.03em;
    margin-bottom: 0.22in;
    line-height: 1.4;
  }

  .subtitle-formal {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 400;
    font-size: 11pt;
    color: rgba(200, 180, 140, 0.45);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    line-height: 1.5;
  }

  .author {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 400;
    font-size: 13pt;
    color: rgba(200, 180, 140, 0.6);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    position: absolute;
    bottom: 0.7in;
  }

  /* Three barely-visible vertical lines behind everything */
  .three-lines {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 0;
  }
  .three-lines .line {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 1px;
    opacity: 0.04;
  }
  .three-lines .line:nth-child(1) { left: 33%; background: #8b6914; }
  .three-lines .line:nth-child(2) { left: 50%; background: #c4a054; }
  .three-lines .line:nth-child(3) { left: 67%; background: #8b6914; }
</style>
</head>
<body>
  <div class="three-lines">
    <div class="line"></div>
    <div class="line"></div>
    <div class="line"></div>
  </div>

  <div class="content">
    <div class="rule-top"></div>

    <div class="title-main">Churchianity<span class="title-tld">.ai</span></div>

    <div class="subtitle-joke">Three AIs Walk Into a Schism</div>

    <div class="subtitle-formal">An Experiment in<br>Computational Ecclesiology</div>

    <div class="rule-bottom"></div>

    <div class="author">Marcus R</div>
  </div>
</body>
</html>
