<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cover C — Mosaic + Graph</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      body { background: #0a0810; }
      .title { font-size: 54px; }
      .subtitle { font-size: 19px; }
      .tagline { max-width: 5.1in; }
    </style>
  </head>
  <body>
    <div class="cover">
      <svg class="overlay" viewBox="0 0 625 925" preserveAspectRatio="none" aria-hidden="true">
        <defs>
          <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0" stop-color="#070715"/>
            <stop offset="0.55" stop-color="#0a0a1b"/>
            <stop offset="1" stop-color="#05050f"/>
          </linearGradient>

          <!-- mosaic tiles -->
          <pattern id="tiles" width="38" height="38" patternUnits="userSpaceOnUse">
            <rect width="38" height="38" fill="rgba(10,10,20,1)"/>
            <rect x="1" y="1" width="16" height="16" fill="rgba(215,179,95,0.22)"/>
            <rect x="19" y="1" width="18" height="10" fill="rgba(90,160,255,0.14)"/>
            <rect x="19" y="13" width="10" height="24" fill="rgba(210,80,110,0.12)"/>
            <rect x="31" y="13" width="6" height="24" fill="rgba(255,255,255,0.06)"/>
            <rect x="1" y="19" width="16" height="18" fill="rgba(255,255,255,0.05)"/>
            <path d="M0 0 H38 V38 H0 Z" fill="none" stroke="rgba(0,0,0,0.55)" stroke-width="2"/>
          </pattern>

          <linearGradient id="vignette" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0" stop-color="rgba(0,0,0,0.70)"/>
            <stop offset="0.25" stop-color="rgba(0,0,0,0.10)"/>
            <stop offset="0.70" stop-color="rgba(0,0,0,0.18)"/>
            <stop offset="1" stop-color="rgba(0,0,0,0.78)"/>
          </linearGradient>
        </defs>

        <rect x="0" y="0" width="625" height="925" fill="url(#bg)"/>

        <!-- abstract mosaic field, slightly rotated by perspective lines -->
        <g opacity="0.95">
          <rect x="-40" y="-20" width="720" height="1020" fill="url(#tiles)"/>
        </g>

        <!-- cracks -->
        <g stroke-linecap="round" fill="none">
          <path d="M90 650 L 160 600 L 210 520 L 260 495 L 320 430 L 380 390 L 460 320 L 560 280"
                stroke="rgba(0,0,0,0.55)" stroke-width="7" opacity="0.8"/>
          <path d="M120 700 L 160 660 L 210 640 L 260 595 L 300 560 L 360 545 L 420 510 L 500 470 L 610 420"
                stroke="rgba(0,0,0,0.40)" stroke-width="5" opacity="0.7"/>
          <path d="M140 280 L 210 320 L 260 360 L 310 350 L 370 370 L 440 410 L 520 395 L 610 420"
                stroke="rgba(0,0,0,0.35)" stroke-width="4" opacity="0.55"/>
        </g>

        <!-- graph overlay -->
        <g stroke="rgba(215,179,95,0.26)" stroke-width="1.4" fill="none" opacity="0.95">
          <path d="M110 760 L 210 700 L 290 740 L 360 660 L 470 705 L 540 635" />
          <path d="M210 700 L 220 610 L 300 585 L 360 660" />
          <path d="M290 740 L 310 820 L 420 845 L 470 705" />
        </g>
        <g fill="rgba(215,179,95,0.60)" opacity="0.95">
          <circle cx="110" cy="760" r="4.4"/>
          <circle cx="210" cy="700" r="4.4"/>
          <circle cx="290" cy="740" r="4.4"/>
          <circle cx="360" cy="660" r="4.4"/>
          <circle cx="470" cy="705" r="4.4"/>
          <circle cx="540" cy="635" r="4.4"/>
          <circle cx="220" cy="610" r="3.8"/>
          <circle cx="300" cy="585" r="3.8"/>
          <circle cx="310" cy="820" r="3.8"/>
          <circle cx="420" cy="845" r="3.8"/>
        </g>

        <!-- vignette to keep text readable -->
        <rect x="0" y="0" width="625" height="925" fill="url(#vignette)"/>
      </svg>

      <div class="stack">
        <div>
          <div class="kicker">Ancient faith • modern method</div>
        </div>

        <div>
          <div class="title">
            Churchianity<span class="ai">.ai</span>
          </div>
          <div class="subtitle" style="margin-top:0.22in;">
            Three AIs Walk Into a Schism
          </div>
          <div class="rule" style="margin-top:0.26in;"></div>
          <div class="tagline" style="margin-top:0.20in;">
            An Experiment in Computational Ecclesiology
          </div>
        </div>

        <div class="bottom">
          <div class="meta">mosaic • fracture • graph</div>
          <div class="meta" style="letter-spacing:0.12em;">churchianity.ai</div>
        </div>
      </div>

      <div class="guides">
        <div class="bleed"></div>
        <div class="trim"></div>
        <div class="safe"></div>
      </div>
    </div>
  </body>
</html>
